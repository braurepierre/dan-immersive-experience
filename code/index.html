<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C R A Z Y   D A N</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0010;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: none;
      font-family: 'Monoton', cursive;
    }

    /* ── Scanlines overlay ── */
    #scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 3px
      );
    }

    /* ── Title ── */
    #title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      font-size: clamp(2rem, 5vw, 5rem);
      letter-spacing: 0.3em;
      color: #ff2d78;
      text-shadow:
        0 0 10px #ff2d78,
        0 0 30px #ff2d78,
        0 0 60px #ff2d78,
        0 0 100px #b400ff,
        4px 4px 0 #00f5ff,
        -2px -2px 0 #b400ff;
      white-space: nowrap;
      user-select: none;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 10px #ff2d78, 0 0 30px #ff2d78, 0 0 60px #ff2d78, 0 0 100px #b400ff, 4px 4px 0 #00f5ff, -2px -2px 0 #b400ff; }
      50% { opacity: 0.92; text-shadow: 0 0 15px #ff2d78, 0 0 40px #ff2d78, 0 0 80px #ff2d78, 0 0 120px #b400ff, 5px 5px 0 #00f5ff, -3px -3px 0 #b400ff; }
    }

    /* ── Custom cursor ── */
    #cursor-dot {
      position: fixed;
      width: 12px;
      height: 12px;
      background: #ff2d78;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 0 8px #ff2d78, 0 0 20px #ff2d78;
      transform: translate(-50%, -50%);
    }

    .trail-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: opacity 0.5s ease-out;
    }

    /* ── Audio element (hidden) ── */
    #bg-audio {
      display: none;
    }

    /* ── Music toggle pill ── */
    #music-toggle {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 25;
      width: 90px;
      height: 32px;
      border-radius: 16px;
      border: 1px solid rgba(0, 245, 255, 0.4);
      background: rgba(10, 0, 16, 0.75);
      cursor: none;
      pointer-events: auto;
      user-select: none;
      display: flex;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(180, 0, 255, 0.2);
      transition: box-shadow 0.3s ease;
    }

    #music-toggle:hover {
      box-shadow: 0 0 18px rgba(255, 45, 120, 0.5), 0 0 35px rgba(180, 0, 255, 0.3);
    }

    /* Indicateur glissant */
    #music-toggle-slider {
      position: absolute;
      top: 2px;
      left: 2px;
      width: calc(50% - 4px);
      height: calc(100% - 4px);
      border-radius: 13px;
      background: rgba(255, 45, 120, 0.15);
      border: 1px solid #ff2d78;
      box-shadow: 0 0 8px #ff2d78, 0 0 16px rgba(255, 45, 120, 0.4);
      transition: left 0.3s ease;
    }

    #music-toggle.playing #music-toggle-slider {
      left: calc(50% + 2px);
      background: rgba(0, 245, 255, 0.1);
      border-color: #00f5ff;
      box-shadow: 0 0 8px #00f5ff, 0 0 16px rgba(0, 245, 255, 0.4);
    }

    /* Labels ON / OFF */
    #music-toggle-off,
    #music-toggle-on {
      position: relative;
      width: 50%;
      text-align: center;
      font-family: 'Monoton', cursive;
      font-size: 9px;
      letter-spacing: 0.1em;
      transition: color 0.3s ease;
      z-index: 1;
    }

    #music-toggle-off {
      color: #ff2d78;
      text-shadow: 0 0 6px #ff2d78;
    }

    #music-toggle-on {
      color: rgba(0, 245, 255, 0.3);
      text-shadow: none;
    }

    /* État playing : ON actif, OFF grisé */
    #music-toggle.playing #music-toggle-off {
      color: rgba(255, 45, 120, 0.3);
      text-shadow: none;
    }

    #music-toggle.playing #music-toggle-on {
      color: #00f5ff;
      text-shadow: 0 0 6px #00f5ff;
    }

    /* ── Vignette overlay ── */
    #vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(10, 0, 16, 0.7) 100%);
    }
  </style>
</head>
<body>

  <!-- Vignette -->
  <div id="vignette"></div>

  <!-- Scanlines -->
  <div id="scanlines"></div>

  <!-- Title -->
  <div id="title">C R A Z Y &nbsp; D A N</div>

  <!-- Music toggle pill -->
  <div id="music-toggle" title="Play / Pause">
    <div id="music-toggle-slider"></div>
    <span id="music-toggle-off">OFF</span>
    <span id="music-toggle-on">ON</span>
  </div>

  <!-- Custom cursor -->
  <div id="cursor-dot"></div>

  <!-- Manifest data (chargé en JS global — compatible http.server) -->
  <script src="manifest.js"></script>

  <!-- Background music (local MP3) -->
  <audio id="bg-audio" loop preload="auto">
    <source src="../media/Music/background music.mp3" type="audio/mpeg">
  </audio>

  <!-- Three.js via CDN importmap (three/addons/ couvre UnrealBloomPass et tous les addons) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <!-- ══════════════════════════════════════════════════ -->
  <!--  APPLICATION CODE (ES module)                     -->
  <!-- ══════════════════════════════════════════════════ -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
